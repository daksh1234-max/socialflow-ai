
[functions.social-schedule]
enabled = true
verify_jwt = false
import_map = "./functions/social-schedule/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/social-schedule/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/social-schedule/*.html" ]
[functions.notifications]
enabled = true
verify_jwt = false
import_map = "./functions/notifications/deno.json"
entrypoint = "./functions/notifications/index.ts"
